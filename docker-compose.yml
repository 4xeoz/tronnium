services:

  vector_db:
    image: tronnium-vector_db:latest
    container_name: tronnium_vectors
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tronnium_vectors
    ports:
      - "5433:5432"

  backend:
    build: ./backend
    container_name: tronnium_backend
    ports:
      - "4000:4000"
    env_file: backend/.env
    environment:
      - VECTOR_DATABASE_URL=postgresql://postgres:postgres@vector_db:5432/tronnium_vectors
    depends_on:
      - vector_db

  frontend:
    build: ./frontend
    container_name: tronnium_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:4000
    depends_on:
      - backend