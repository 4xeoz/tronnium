services:
  vector_db:
    image: pgvector/pgvector:pg16
    container_name: tronnium_vectors
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tronnium_vectors
    ports:
      - "5433:5432"           # port 5433 to avoid clash with any local Postgres
    volumes:
      - tronnium_vector_pgdata:/var/lib/postgresql/data

volumes:
  tronnium_vector_pgdata: